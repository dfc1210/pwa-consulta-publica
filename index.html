<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 2.7 Biometric PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue-router@3.6.5/dist/vue-router.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .pwa-page { 
            border: 1px solid #ccc; 
            padding: 20px; 
            border-radius: 8px; 
            max-width: 300px; 
            margin: auto; 
            background-color: #FFFAC2;
        }
        button { 
            margin-top: 10px; 
            padding: 10px;
            cursor: pointer; 
            font-weight: bold;
            font-size: 12px;
            vertical-align: middle;
            background-color: #999800;
            text-align: left;
            text-decoration: none;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <router-view></router-view>
    </div>
    <script src="src/utils.js"></script>
    <script src="src/constants.js"></script>
    <script src="src/criadores.js"></script>
    <script src="src/establecimientos.js"></script>
    <script src="src/animal.js"></script>
    <script src="src/animales.js"></script>
    <script src="src/app.js"></script>
</body>
</html>
